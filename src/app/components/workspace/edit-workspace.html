<div class="page-container">
  <header class="top-nav">
    <div class="brand">
      <div class="brand-icon">
        <svg width="22" height="22" viewBox="0 0 32 32" fill="currentColor" aria-hidden="true">
          <rect x="4" y="6" width="20" height="8" rx="1.5"></rect>
          <rect x="8" y="18" width="20" height="8" rx="1.5"></rect>
        </svg>
      </div>
      <span class="brand-name">Sentinent</span>
    </div>
    <a routerLink="/dashboard" class="back-nav-btn">Back to Dashboard</a>
  </header>

  <main class="form-wrapper">
    <div class="form-card">
      <div class="form-header">
        <h2>Edit Workspace</h2>
        <p>Update the details of your workspace below.</p>
      </div>

      <div *ngIf="isLoading" class="loading-state">
        <div class="spinner"></div>
        <span>Loading workspace...</span>
      </div>

      <form *ngIf="!isLoading && hasWorkspace" (ngSubmit)="onSubmit()" #workspaceForm="ngForm" novalidate>
        <div class="form-group">
          <label for="workspace-name">Workspace Name</label>
          <input
            id="workspace-name"
            name="workspaceName"
            type="text"
            required
            [(ngModel)]="name"
            [disabled]="isSubmitting"
            placeholder="e.g. Product Team"
            class="premium-input"
          />
        </div>

        <div class="form-group">
          <label for="workspace-description">Description</label>
          <textarea
            id="workspace-description"
            name="workspaceDescription"
            [(ngModel)]="description"
            [disabled]="isSubmitting"
            rows="4"
            placeholder="Describe this workspace"
            class="premium-input"
          ></textarea>
        </div>

        <div class="form-actions">
          <button type="submit" [disabled]="isSubmitting || !workspaceForm.form.valid" class="premium-btn">
            {{ isSubmitting ? 'Updating...' : 'Save Changes' }}
          </button>
        </div>
      </form>

      <p *ngIf="error" class="error-msg">{{ error }}</p>
    </div>
  </main>
</div>
