<section class="reset-shell">
  <div class="reset-card">
    <p class="eyebrow">Account Recovery</p>
    <h1>Reset your password</h1>

    <p class="supporting-copy" *ngIf="isLoading">Validating your reset link...</p>

    <div *ngIf="!isLoading && errorMessage" class="message error">
      <p>{{ errorMessage }}</p>
      <a routerLink="/login" class="link-btn">Back to sign in</a>
    </div>

    <form *ngIf="!isLoading && isTokenValid && !successMessage" (ngSubmit)="submit()" class="reset-form">
      <p class="supporting-copy">
        Choose a new password for <strong>{{ email }}</strong>.
      </p>

      <label for="password">New password</label>
      <input
        id="password"
        name="password"
        type="password"
        [(ngModel)]="password"
        autocomplete="new-password"
        placeholder="At least 8 characters"
      />

      <label for="confirmPassword">Confirm password</label>
      <input
        id="confirmPassword"
        name="confirmPassword"
        type="password"
        [(ngModel)]="confirmPassword"
        autocomplete="new-password"
        placeholder="Repeat your new password"
      />

      <p *ngIf="errorMessage" class="inline-error">{{ errorMessage }}</p>

      <button type="submit" class="primary-btn" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Updating password...' : 'Reset password' }}
      </button>
      <a routerLink="/login" class="link-btn">Back to sign in</a>
    </form>

    <div *ngIf="successMessage" class="message success">
      <p>{{ successMessage }}</p>
    </div>
  </div>
</section>
